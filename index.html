const loadAllOrders = async () => {
  try {
    const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
    const querySnapshot = await getDocs(q);
    const orders = [];
    querySnapshot.forEach((doc) => orders.push(doc.data()));
    return orders;
  } catch (e) { console.error("Yükleme hatası: ", e); return []; }
};
const updateOrderStatus = async (orderId, status) => {
  try {

    if (status === 'shipped') updates.shippedAt = new Date().toISOString();
    await updateDoc(orderRef, updates);

const validateImage = (file) => new Promise((resolve, reject) => {
  if (!file.type.startsWith('image/')) return reject('Please upload an image file (JPG, PNG).');
  if (file.size > 10 * 1024 * 1024) return reject('Image must be smaller than 10MB.');
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    URL.revokeObjectURL(url);
    if (img.width < 500 || img.height < 500) return reject(`Resolution too low (${img.width}×${img.height}px). Please upload at least 500×500px for best results.`);
    const reader = new FileReader();
    reader.onload = (e) => resolve({ dataUrl: e.target.result, width: img.width, height: img.height, size: file.size, name: file.name });
    reader.readAsDataURL(file);
  };
  img.onerror = () => reject('Could not load the image. Please try another file.');
  img.src = url;
});

const StepIndicator = ({ currentStep }) => {

    <div className="max-w-3xl mx-auto px-4 py-8">

          const state = stepNum < currentStep ? 'done' : stepNum === currentStep ? 'active' : 'pending';

// ============= STEP 1: UPLOAD =============
const Step1Upload = ({ onNext, initialPhoto }) => {
  const [photo, setPhoto] = useState(initialPhoto);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleFile = async (file) => {
    setError(''); setLoading(true);
    try { setPhoto(await validateImage(file)); }
    catch (e) { setError(typeof e === 'string' ? e : 'Upload failed.'); }
    setLoading(false);
  };

  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    if (e.dataTransfer.files?.[0]) handleFile(e.dataTransfer.files[0]);
  };

  return (
    <div className="max-w-3xl mx-auto px-4 pb-12">
      <div className="text-center mb-8">
        <p className="text-xs font-bold tracking-widest text-coral uppercase mb-2">Step 1 of 5</p>
        <h2 className="font-display text-4xl md:text-5xl text-navy mb-3">Upload a headshot</h2>
        <p className="text-gray-600">A clear, front-facing photo works best. Only the head will be used.</p>
      </div>
      {!photo ? (
        <>
          <div className={`upload-zone ${dragOver ? 'drag-over' : ''} rounded-2xl p-12 text-center cursor-pointer`}
            onClick={() => inputRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={onDrop}>
            <div className="w-20 h-20 mx-auto mb-4 rounded-full bg-cream-warm flex items-center justify-center">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1e3a5f" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <h3 className="font-display text-2xl text-navy mb-2">{loading ? 'Checking your photo...' : 'Drop your photo here'}</h3>
            <p className="text-gray-500 mb-4">or click to browse</p>
            <p className="text-xs text-gray-400">JPG or PNG · Min 500×500px · Max 10MB</p>
            <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={(e) => e.target.files?.[0] && handleFile(e.target.files[0])} />
          </div>
          <div className="mt-8 grid md:grid-cols-3 gap-4">
            {[{icon:'✓',title:'Front-facing',d:'Look into the camera'},{icon:'☀',title:'Well-lit',d:'Natural light works best'},{icon:'◉',title:'Head only',d:'Face clearly visible'}].map((tip, i) => (
              <div key={i} className="bg-white border border-soft rounded-xl p-4 text-center">
                <div className="text-2xl text-coral mb-1">{tip.icon}</div>
                <div className="font-semibold text-navy text-sm">{tip.title}</div>
                <div className="text-xs text-gray-500 mt-1">{tip.d}</div>
              </div>
            ))}
          </div>
        </>
      ) : (
        <div className="bg-white rounded-2xl border border-soft p-8">
          <div className="flex flex-col md:flex-row gap-6 items-center">
            <img src={photo.dataUrl} alt="" className="w-48 h-48 object-cover rounded-xl shadow-md" />
            <div className="flex-1 text-center md:text-left">
              <h3 className="font-display text-2xl text-navy mb-2">Photo looks great!</h3>
              <p className="text-gray-600 text-sm mb-1">{photo.width} × {photo.height} pixels</p>
              <p className="text-gray-500 text-xs mb-4">{photo.name}</p>
              <button onClick={() => setPhoto(null)} className="btn-outline px-4 py-2 rounded-full text-sm">Change photo</button>
            </div>
          </div>
        </div>
      )}
      {error && <div className="mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">⚠ {error}</div>}
      <div className="mt-8 flex justify-end">
        <button onClick={() => photo && onNext(photo)} disabled={!photo} className="btn-primary px-10 py-4 rounded-full font-semibold flex items-center gap-2">Continue <span>→</span></button>
      </div>
    </div>
  );
};

// ============= STEP 5: CHECKOUT =============
const Step5Checkout = ({ onNext, onBack, variant, selectedImage }) => {
  const [form, setForm] = useState({ firstName: '', lastName: '', email: '', phone: '', country: '', city: '', postalCode: '', address: '', notes: '' });
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);

  const update = (k, v) => { setForm({ ...form, [k]: v }); if (errors[k]) setErrors({ ...errors, [k]: null }); };

  const validate = () => {
    const e = {};
    if (!form.firstName.trim()) e.firstName = 'Required';
    if (!form.lastName.trim()) e.lastName = 'Required';
    if (!form.email.trim() || !/^[^@]+@[^@]+\.[^@]+$/.test(form.email)) e.email = 'Valid email required';
    if (!form.phone.trim()) e.phone = 'Required';
    if (!form.country.trim()) e.country = 'Required';
    if (!form.city.trim()) e.city = 'Required';
    if (!form.postalCode.trim()) e.postalCode = 'Required';
    if (!form.address.trim() || form.address.length < 10) e.address = 'Please enter your full address';
    setErrors(e); return Object.keys(e).length === 0;
  };

  const submit = async () => {
    if (!validate()) return;
    setSubmitting(true); await onNext(form); setSubmitting(false);
  };

  return (
    <div className="max-w-5xl mx-auto px-4 pb-12">
      <div className="text-center mb-8">
        <p className="text-xs font-bold tracking-widest text-coral uppercase mb-2">Step 5 of 5</p>
        <h2 className="font-display text-4xl md:text-5xl text-navy mb-3">Almost there!</h2>
        <p className="text-gray-600">Where should we send your figure?</p>
      </div>
      <div className="grid md:grid-cols-3 gap-6">
        <div className="md:col-span-2 space-y-6">
          <div className="bg-white rounded-2xl border border-soft p-6">
            <h3 className="font-display text-xl text-navy mb-4">Contact</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">First name</label><input type="text" value={form.firstName} onChange={(e) => update('firstName', e.target.value)} />{errors.firstName && <p className="text-red-500 text-xs mt-1">{errors.firstName}</p>}</div>
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Last name</label><input type="text" value={form.lastName} onChange={(e) => update('lastName', e.target.value)} />{errors.lastName && <p className="text-red-500 text-xs mt-1">{errors.lastName}</p>}</div>
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Email</label><input type="email" value={form.email} onChange={(e) => update('email', e.target.value)} />{errors.email && <p className="text-red-500 text-xs mt-1">{errors.email}</p>}</div>
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Phone</label><input type="tel" value={form.phone} onChange={(e) => update('phone', e.target.value)} placeholder="+1 ..." />{errors.phone && <p className="text-red-500 text-xs mt-1">{errors.phone}</p>}</div>
            </div>
          </div>
          <div className="bg-white rounded-2xl border border-soft p-6">
            <h3 className="font-display text-xl text-navy mb-4">Shipping address</h3>
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Country</label><input type="text" value={form.country} onChange={(e) => update('country', e.target.value)} placeholder="United States" />{errors.country && <p className="text-red-500 text-xs mt-1">{errors.country}</p>}</div>
                <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">City</label><input type="text" value={form.city} onChange={(e) => update('city', e.target.value)} />{errors.city && <p className="text-red-500 text-xs mt-1">{errors.city}</p>}</div>
              </div>
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Postal code</label><input type="text" value={form.postalCode} onChange={(e) => update('postalCode', e.target.value)} />{errors.postalCode && <p className="text-red-500 text-xs mt-1">{errors.postalCode}</p>}</div>
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Street address</label><textarea rows={3} value={form.address} onChange={(e) => update('address', e.target.value)} placeholder="Street, apartment, building..." />{errors.address && <p className="text-red-500 text-xs mt-1">{errors.address}</p>}</div>
              <div><label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1 block">Order notes (optional)</label><textarea rows={2} value={form.notes} onChange={(e) => update('notes', e.target.value)} placeholder="Gift wrapping, special requests..." /></div>
            </div>
          </div>
          <div className="bg-white rounded-2xl border border-soft p-6">
            <h3 className="font-display text-xl text-navy mb-4">Payment</h3>
            <div className="bg-cream-warm rounded-xl p-6 text-center border border-dashed border-coral">
              <div className="text-2xl mb-2">🧪</div>
              <p className="font-semibold text-navy mb-1">Demo Mode</p>
              <p className="text-sm text-gray-600">Payment gateway integration comes later. This order will be placed without charging a real card.</p>
            </div>
          </div>
        </div>
        <div className="md:col-span-1">
          <div className="bg-white rounded-2xl border border-soft p-6 sticky top-24">
            <h3 className="font-display text-xl text-navy mb-4">Your order</h3>
            <div className="aspect-[2/3] rounded-lg overflow-hidden mb-4 bg-cream-warm">
              {selectedImage && <img src={selectedImage} alt="Your figure" className="w-full h-full object-cover" />}

            <div className="space-y-3 text-sm">
              <div className="flex justify-between"><span className="text-gray-500">Product</span><span className="font-semibold text-navy text-right">{variant?.name}<br/>{variant?.size}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">Quantity</span><span className="font-semibold text-navy">1</span></div>
              <div className="border-t border-soft pt-3 flex justify-between items-end"><span className="text-gray-500">Total</span><span className="font-display text-2xl text-navy">{formatPrice(variant?.price || 0)}</span></div>

// ============= CUSTOMER FLOW =============
const CustomerFlow = () => {
  const [step, setStep] = useState(0);
  const [photo, setPhoto] = useState(null);
  const [prompt, setPrompt] = useState('');
  const [aiResults, setAiResults] = useState(null);
  const [regensLeft, setRegensLeft] = useState(3);
  const [generating, setGenerating] = useState(false);
  const [hasGenerated, setHasGenerated] = useState(false);
  const [selectedImage, setSelectedImage] = useState(null);
  const [selectedImageIdx, setSelectedImageIdx] = useState(null);
  const [variant, setVariant] = useState(null);
  const [completedOrder, setCompletedOrder] = useState(null);

  const resetAll = () => {
    setStep(0); setPhoto(null); setPrompt(''); setAiResults(null);
    setRegensLeft(3); setSelectedImage(null); setSelectedImageIdx(null);
    setVariant(null); setCompletedOrder(null); setHasGenerated(false);
  };

  const generateImages = async () => {
    setGenerating(true);
    const base64Image = photo.dataUrl.split(',')[1];

    try {
      const response = await fetch('/.netlify/functions/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, imageBase64: base64Image, masterPrompt: MASTER_PROMPT })
      });
      const data = await response.json();
      
      if (data.images && data.images.length > 0) {
        setAiResults(data.images);
      } else {
        alert('Yapay zeka üretimi başarısız oldu. Lütfen tekrar deneyin.');
      }
    } catch (err) {
      console.error('API Hatası:', err);
      alert('Sunucu bağlantısı kurulamadı.');
    }

    if (hasGenerated) setRegensLeft(r => r - 1); else setHasGenerated(true);
    setGenerating(false);
  };

  const placeOrder = async (customerForm) => {
    const order = {
      id: `order_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
      status: 'pending',
      createdAt: new Date().toISOString(),
      customer: customerForm,
      photo: { dataUrl: photo.dataUrl, width: photo.width, height: photo.height, name: photo.name },
      prompt: prompt,
      masterPrompt: MASTER_PROMPT,
      aiResults: aiResults,
      selectedImageIndex: selectedImageIdx,
      selectedImage: selectedImage,
      variant: variant,
      regenerationsUsed: 3 - regensLeft,
    };
    await saveOrder(order);
    setCompletedOrder(order);
    setStep(6);
  };

  if (step === 0) return <Landing onStart={() => setStep(1)} />;
  if (step === 6 && completedOrder) return <SuccessPage order={completedOrder} onNew={resetAll} />;

  return (
    <div>
      <StepIndicator currentStep={step} />
      {step === 1 && <Step1Upload initialPhoto={photo} onNext={(p) => { setPhoto(p); setStep(2); }} />}
      {step === 2 && <Step2Prompt initialPrompt={prompt} onNext={(p) => { if (p !== prompt) { setAiResults(null); setHasGenerated(false); } setPrompt(p); setStep(3); }} onBack={() => setStep(1)} />}
      {step === 3 && <Step3Generate aiResults={aiResults} onGenerate={generateImages} generating={generating} regensLeft={regensLeft} onNext={(img, idx) => { setSelectedImage(img); setSelectedImageIdx(idx); setStep(4); }} onBack={() => setStep(2)} />}
      {step === 4 && <Step4Variant selectedVariant={variant} onNext={(v) => { setVariant(v); setStep(5); }} onBack={() => setStep(3)} />}
      {step === 5 && <Step5Checkout variant={variant} selectedImage={selectedImage} onNext={placeOrder} onBack={() => setStep(4)} />}
    </div>
  );
};

  const [view, setView] = useState('customer');

  if (view === 'admin-login') return <AdminLogin onSuccess={() => setView('admin')} onCancel={() => setView('customer')} />;
  if (view === 'admin') return <AdminPanel onExit={() => setView('customer')} />;

  return (
    <div>
      <Header onAdminClick={() => setView('admin-login')} />
      <CustomerFlow />
      <footer className="py-12 mt-16" style={{background: '#0f2340', color: '#faf7f2'}}>
        <div className="max-w-7xl mx-auto px-4 md:px-8">
          <div className="grid md:grid-cols-3 gap-8">
            <div>
              <Logo size="md" color="cream" />
              <p className="text-sm opacity-70 mt-4 max-w-xs">Custom AI-designed figures, laser-cut and shipped worldwide from Türkiye.</p>
            </div>
            <div>
              <h4 className="font-display text-lg mb-3">Materials</h4>
              <ul className="text-sm space-y-1 opacity-70">
                <li>Laser-cut MDF wood</li>
                <li>Premium acrylic 5mm</li>
                <li>UV-printed full color</li>
              </ul>
            </div>
            <div>
              <h4 className="font-display text-lg mb-3">Support</h4>
              <ul className="text-sm space-y-1 opacity-70">
                <li>Worldwide shipping</li>
                <li>24h order review</li>
                <li>Etsy verified shop</li>
              </ul>
            </div>
          </div>
          <div className="border-t border-white border-opacity-10 mt-8 pt-6 text-center text-xs opacity-50">© 2026 Figurist · Grafizm · Handcrafted with care</div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
